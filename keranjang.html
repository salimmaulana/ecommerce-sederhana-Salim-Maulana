<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keranjang</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#f5f5f5;
    }

        header{
            background-color: #222;
            color: white;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

    .logo{
      font-size:24px;
      font-weight:bold;
    }

    nav ul{
      display:flex;
      list-style:none;
      gap:20px;
    }

    nav ul li a{
      color:white;
      text-decoration:none;
    }

    h1{
      text-align:center;
      margin:30px 0;
    }

    .container{
      width:80%;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:10px;
    }

    .item{
      display:flex;
      justify-content:space-between;
      padding:15px 0;
      border-bottom:1px solid #ddd;
    }

    .total{
      margin-top:20px;
      font-size:20px;
      font-weight:bold;
      text-align:right;
    }

    .hapus{
      background:red;
      color:white;
      border:none;
      padding:5px 10px;
      border-radius:5px;
      cursor:pointer;
    }

        footer{
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #222;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
  </style>
</head>
<body>

<header>
  <div class="logo">TOKOKU</div>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="produk.html">Produk</a></li>
      <li><a href="kategori.html">Kategori</a></li>
      <li><a href="keranjang.html">Keranjang</a></li>
    </ul>
  </nav>
</header>

<h1>Keranjang Belanja</h1>

<div class="container" id="keranjang-list">

</div>

    <!-- FOOTER -->
    <footer>
        <p>Kontak: salimmaulana434@gmail.com | +62 896-4950-1030</p>
        <p>&copy; 2026 WARTEH22. All Rights Reserved.</p>
    </footer>
<div class="container" id="list-keranjang"></div>
<script>

let keranjang = JSON.parse(localStorage.getItem("keranjang")) || [];

let list = document.getElementById("list-keranjang");

let total = 0;

if(keranjang.length == 0){

  list.innerHTML = "<h2>Keranjang Kosong</h2>";

}else{

  keranjang.forEach((item, index) => {

    total += item.harga;

    list.innerHTML += `
    
      <div class="item">

        <img src="${item.gambar}" width="100">

        <div>
          <h3>${item.nama}</h3>
          <p>Rp${item.harga}</p>
        </div>

        <button onclick="hapusItem(${index})">
          Hapus
        </button>

      </div>

      <hr>
    
    `;
  });

  list.innerHTML += `
    <h2>Total: Rp${total}</h2>
  `;
}

function hapusItem(index){

  keranjang.splice(index, 1);

  localStorage.setItem("keranjang", JSON.stringify(keranjang));

  location.reload();

}

</script>
</body>
</html>
